<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Imsakiyah - Ramadhan 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0C5C42;
            --secondary: #F2CD80;
            --bg: #F8F8F3;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); }
        
        .highlight-today {
            background-color: #fef3c7 !important; /* Amber-100 */
            border-left: 4px solid var(--secondary);
            font-weight: bold;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--primary);
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="pb-10">

    <header class="bg-[#0C5C42] text-white py-10 px-6 text-center shadow-lg">
        <h1 class="text-3xl font-bold">🌙 Jadwal Imsak</h1>
    </header>

    <main class="max-w-5xl mx-auto mt-8 px-4">
        
        <section class="bg-white p-6 rounded-2xl shadow-sm mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <label for="city-select" class="block text-sm font-semibold text-gray-700 mb-1">Pilih Kota/Kabupaten:</label>
                <select id="city-select" class="w-full md:w-80 p-3 border-2 border-emerald-100 rounded-xl focus:border-[#0C5C42] outline-none bg-gray-50 transition-all">
                    <option value="">Memuat daftar kota...</option>
                </select>
            </div>
            <div class="text-center lg:text-left">
                <h2 id="display-location" class="text-xl font-bold text-[#0C5C42]">JAKARTA</h2>
                <p id="display-month" class="text-gray-500 text-sm">Ramadhan 1447 H / Maret 2026</p>
            </div>
        </section>

        <div id="loading-state" class="hidden flex-col items-center py-20">
            <div class="loading-spinner mb-4"></div>
            <p class="text-emerald-800 font-medium">Memuat jadwal imsakiyah...</p>
        </div>

        <div id="error-state" class="hidden bg-red-50 border-l-4 border-red-500 p-6 rounded-xl text-center">
            <p class="text-red-700 font-bold">Gagal memuat data!</p>
            <button onclick="fetchJadwal()" class="mt-3 text-sm underline text-red-600 hover:text-red-800">Coba lagi</button>
        </div>

        <div id="table-wrapper" class="table-container bg-white hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-[#0C5C42] text-white">
                    <tr>
                        <th class="p-4 text-sm font-semibold uppercase tracking-wider">Tanggal</th>
                        <th class="p-4 text-sm font-semibold uppercase tracking-wider">Imsak</th>
                        <th class="p-4 text-sm font-semibold uppercase tracking-wider">Subuh</th>
                        <th class="p-4 text-sm font-semibold uppercase tracking-wider">Dzuhur</th>
                        <th class="p-4 text-sm font-semibold uppercase tracking-wider">Ashar</th>
                        <th class="p-4 text-sm font-semibold uppercase tracking-wider">Maghrib</th>
                        <th class="p-4 text-sm font-semibold uppercase tracking-wider">Isya</th>
                    </tr>
                </thead>
                <tbody id="schedule-body" class="text-gray-700 divide-y divide-gray-100">
                    </tbody>
            </table>
        </div>
    </main>

    <footer class="mt-12 text-center text-gray-400 text-sm">
        &copy; 2026 Ramadhan Check Multi-Page | Data by MyQuran API
    </footer>

    <script src="app.js"></script>
</body>
</html>
